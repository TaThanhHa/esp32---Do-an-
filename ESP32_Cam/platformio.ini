[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_port = COM5

# 1. ÉP PHÂN VÙNG GIỐNG ARDUINO IDE (Huge APP)
board_build.partitions = huge_app.csv

# 2. ÉP THÔNG SỐ FLASH GIỐNG TRONG HÌNH
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L

# 3. FIX LỖI BOOT (Quan trọng cho dòng CAM)
monitor_rts = 0
monitor_dtr = 0
upload_speed = 921600

# 4. KÍCH HOẠT PSRAM (BẮT BUỘC ĐỂ XỬ LÝ ẢNH)
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue